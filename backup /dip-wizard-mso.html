  var iconCls=isCurr?'curr':isDone?'done':isPMS?'pms':'ago';
  var iconContent=isDone&&!isCurr?'<i class="bi bi-check-lg"></i>':step.label;
  var label=step.type==='tank'
    ?(S.mode==='morning'?step.label+' Opening':step.label+' Closing')
    :(S.mode==='morning'?step.label+' Opening Metre':step.label+' Closing Metre');
  var sub=step.type==='tank'?step.product+' · '+step.cap.toLocaleString('en-NG')+'L':step.product+' → '+step.tank;

  return'<div class="ov-item '+(isCurr?'curr':isDone?'done-item':'')+'" onclick="jumpToStep('+step.idx+')">'
    +'<div class="ov-icon '+(isDone&&!isCurr?'done':iconCls)+'">'+iconContent+'</div>'
    +'<div class="ov-info"><div class="ov-label">'+label+'</div><div class="ov-sub">'+sub+'</div></div>'
    +(isDone
      ?'<div class="ov-val">'+fmtNum(val)+(step.type==='tank'?' L':'')+'</div>'
      :'<div class="ov-val empty">—</div>')
    +'</div>';
}

function jumpToStep(idx){
  /* Soft-save current input before jumping */
  var inp=document.getElementById('main-inp');
  if(inp&&inp.value){
    var v=parseFloat(inp.value.replace(/,/g,''));
    if(!isNaN(v)&&v>0)S.values[STEPS[S.currentStep].id]=v;
    persistLocal();
  }
  closeOverview();
  goToStep(idx,'none');
}

function closeOverview(){
  var modal=document.getElementById('ov-modal');
  if(modal)modal.classList.remove('show');
}

function updateWizardHeader(){
  var step=STEPS[S.currentStep];
  var isMorn=S.mode==='morning';
  var lbl=document.getElementById('wh-step-lbl');
  var sub=document.getElementById('wh-step-sub');
  var pill=document.getElementById('wh-mode-pill');
  var pillTxt=document.getElementById('wh-mode-txt');

    lbl.textContent=step.type==='tank'
      ?(isMorn?step.label+' — Opening Stock':step.label+' — Closing Stock')
      :(isMorn?step.label+' — Opening Metre':step.label+' — Closing Metre');
  }
  if(sub){
    sub.textContent='Step '+(S.currentStep+1)+' of '+STEPS.length+(step.type==='tank'?' · Tank':'· Pump');
  }
  if(pill){
    pill.className='mode-pill '+(isMorn?'morning':'evening');
    if(pillTxt)pillTxt.textContent=isMorn?'Morning':'Evening';
    var pillIcon=pill.querySelector('i');
    if(pillIcon)pillIcon.className='bi bi-'+(isMorn?'sunrise':'moon-stars');
  }
}

function updateProgress(){
  var done=STEPS.filter(function(s){var v=S.values[s.id];return v&&v>0;}).length;
  var pct=Math.round((done/STEPS.length)*100);
  var fill=document.getElementById('wh-progress-fill');
  if(fill)fill.style.width=pct+'%';
}

function updateDots(){
  var container=document.getElementById('wh-dots');
  if(!container)return;
  var html='';
  STEPS.forEach(function(step){
    var val=S.values[step.id];
    var isDone=val&&val>0;
    var isCurr=step.idx===S.currentStep;
    var cls='sdot'+(isCurr?' curr':isDone?' done':'');
    html+='<div class="'+cls+'" onclick="jumpToStep('+step.idx+')" title="'+step.label+'"></div>';
  });
  container.innerHTML=html;
}

function updateNavButtons(){
  var prev=document.getElementById('nav-prev');
  var next=document.getElementById('nav-next');
  var ctr=document.getElementById('nav-ctr');
  var lbl=document.getElementById('nav-next-lbl');

  if(prev)prev.disabled=false;
  if(ctr)ctr.textContent=(S.currentStep+1)+' / '+STEPS.length;

  var isLast=S.currentStep===STEPS.length-1;
  var isMorn=S.mode==='morning';

  if(next){
    next.className='nav-next '+(isMorn?'morn':'eve')+(isLast?' rev':'');
    if(lbl)lbl.textContent=isLast?'Review':'Next';
    var ico=next.querySelector('i');
    if(ico)ico.className='bi bi-'+(isLast?'clipboard-check':'chevron-right');
  }
}

function updateSyncBadge(){
  var btn=document.getElementById('sync-btn');
  if(!btn)return;
  btn.classList.toggle('pending',S.syncQueue.length>0);
}

function updateOfflineBanner(){
  var b=document.getElementById('offline-banner');
  if(!b)return;
  if(S.online){b.classList.remove('show');}
  else{
    b.classList.add('show');
    var txt=document.getElementById('offline-txt');
    if(txt)txt.textContent='Offline — '+S.syncQueue.length+' step(s) pending sync';
  }
}

/* ═══════════════════════════════════════════════
   SUCCESS SCREEN
═══════════════════════════════════════════════ */
function goToDashboard(){location.href='dashboard-supervisor.html';}
function startNewEntry(){
  S.values={};S.morning={};S.photos={};S.stepSaved={};S.submitted=false;
  S.currentStep=0;
  showScreen('select');
  selectMode('morning');
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function fmtNum(n){
  if(n===undefined||n===null||n==='')return'—';
  var num=Number(n);
  if(isNaN(num))return'—';
  return num.toLocaleString('en-NG',{maximumFractionDigits:2});
}

function vibrate(pattern){
  try{if(navigator.vibrate)navigator.vibrate(pattern);}catch(e){}
}

var _toastTimer;
function showToast(msg,type){
  var icons={ok:'bi-check-circle-fill',err:'bi-x-circle-fill',info:'bi-info-circle-fill'};
  var colors={ok:'rgba(22,163,74,.9)',err:'rgba(220,38,38,.9)',info:'rgba(9,13,31,.96)'};
  var ico=document.getElementById('t-ico');
  var tmsg=document.getElementById('t-msg');
  var toast=document.getElementById('toast');
  if(!toast)return;
  if(ico)ico.className='bi '+(icons[type]||'bi-info-circle-fill');
  if(tmsg)tmsg.textContent=msg;
  toast.style.background=colors[type]||'rgba(9,13,31,.96)';
  toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){toast.classList.remove('show');},3200);
}

/* ═══════════════════════════════════════════════
   ERROR HANDLER
═══════════════════════════════════════════════ */
window.onerror=function(msg,src,line){
  console.error('Wizard error line '+line+':',msg);
  showToast('Error: '+msg.substring(0,60),'err');
  return false;
};
