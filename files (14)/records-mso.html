<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#F8FAFC"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="mso-styles.css"/>
<title>Records — MSO</title>
<style>
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;padding:calc(var(--sat)+14px) var(--px) 14px;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.tb-back{width:40px;height:40px;border-radius:50%;background:var(--g100);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-2)}
.tb-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.02em;flex:1}

/* FILTER BAR */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px var(--px)}
.filter-row{display:flex;gap:8px;align-items:center}
.date-inp{height:40px;border:1.5px solid var(--border);border-radius:var(--r-md);padding:0 12px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--g50);outline:none;flex:1;-webkit-appearance:none}
.date-inp:focus{border-color:var(--cyan);background:#fff}
.filter-sep{font-size:12px;color:var(--text-4);flex-shrink:0}
.btn-filter{height:40px;padding:0 14px;border-radius:var(--r-md);background:var(--cyan);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-reset{height:40px;width:40px;border-radius:var(--r-md);background:var(--g100);border:1px solid var(--border);color:var(--text-3);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.count-bar{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.count-txt{font-size:12px;font-weight:600;color:var(--text-4)}

/* RECORD CARD */
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-xs);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all .15s var(--ease)}
.record-card:hover{box-shadow:var(--shadow-md);border-color:var(--g300)}
.record-card.selected{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-ll),var(--shadow-md)}
.rc-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.rc-date-block{background:var(--g50);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 12px;text-align:center;min-width:52px;flex-shrink:0}
.rc-day{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-4)}
.rc-num{font-size:22px;font-weight:900;color:var(--text);line-height:1;margin:2px 0}
.rc-mon{font-size:9px;font-weight:700;color:var(--text-4)}
.rc-divider{width:1px;height:40px;background:var(--border);flex-shrink:0}
.rc-info{flex:1;min-width:0}
.rc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.rc-sub{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.rc-meta{text-align:right;flex-shrink:0}
.rc-amount{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--text)}
.rc-litres{font-size:10px;color:var(--text-4);margin-top:2px}
.rc-chevron{font-size:14px;color:var(--text-4);margin-top:2px;display:block}

/* PILLS */
.pill{display:inline-flex;align-items:center;border-radius:var(--r-full);padding:2px 8px;font-size:10px;font-weight:700}
.p-c{background:var(--cyan-ll);color:var(--cyan-d);border:1px solid var(--cyan-l)}
.p-a{background:var(--amber-l);color:var(--amber-d);border:1px solid var(--amber-b)}
.p-g{background:var(--green-l);color:var(--green-d);border:1px solid var(--green-b)}
.p-r{background:var(--red-l);color:var(--red-d);border:1px solid var(--red-b)}
.p-n{background:var(--g100);color:var(--g500);border:1px solid var(--g200)}

/* DETAIL PANEL */
.detail-panel{border-top:1px solid var(--border);background:var(--g50)}
.dp-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.dp-title{font-size:13px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.dp-actions{display:flex;gap:6px;flex-wrap:wrap}
.dp-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:var(--r-sm);font-size:11px;font-weight:700;border:1px solid;cursor:pointer;white-space:nowrap}
.dp-btn-edit{background:var(--purple-l);border-color:var(--purple-b);color:var(--purple)}
.dp-btn-dip{background:var(--cyan-ll);border-color:var(--cyan-l);color:var(--cyan-d)}
.dp-btn-summary{background:var(--green-l);border-color:var(--green-b);color:var(--green-d)}
.dp-close{width:28px;height:28px;border-radius:50%;background:var(--g100);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-3);cursor:pointer}
.dp-body{padding:16px}
.dp-section{margin-bottom:16px}
.dp-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-4);margin-bottom:10px}
.mini-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mk{border-radius:var(--r-md);padding:10px 12px}
.mk-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-4);margin-bottom:3px}
.mk-val{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--text)}
.detail-tbl{width:100%;border-collapse:collapse;font-size:12px}
.detail-tbl th{padding:8px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-4);background:var(--g100);border-bottom:1px solid var(--border)}
.detail-tbl td{padding:9px 10px;border-bottom:1px solid var(--g100);vertical-align:middle}
.detail-tbl tfoot td{font-weight:700;background:var(--g50);font-size:12px;border-top:2px solid var(--border)}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-item{background:var(--g50);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px}
.pay-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-4);margin-bottom:3px}
.pay-val{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--text)}

/* EMPTY */
.empty-state{text-align:center;padding:48px 24px;color:var(--text-4)}
.empty-state i{font-size:48px;opacity:.3;margin-bottom:12px;display:block}
.empty-state h3{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--text-3)}
.empty-state p{font-size:13px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);z-index:9999;border-radius:var(--r-lg);padding:12px 20px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;max-width:92vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body style="background:var(--bg)">

<div class="topbar">
  <a id="backBtn" href="dashboard-supervisor.html" class="tb-back"><i class="bi bi-arrow-left"></i></a>
  <div class="tb-title">Daily Records</div>
  <span class="pill p-c" id="roleChip">Supervisor</span>
  <button onclick="doRefresh()" style="width:36px;height:36px;border-radius:50%;background:var(--g100);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-3);cursor:pointer">
    <i class="bi bi-arrow-clockwise" id="rfIco"></i>
  </button>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <div class="filter-row">
    <input type="date" class="date-inp" id="fromDate"/>
    <div class="filter-sep">to</div>
    <input type="date" class="date-inp" id="toDate"/>
    <button class="btn-filter" onclick="doRefresh()">Search</button>
    <button class="btn-reset" onclick="resetFilter()" title="Reset"><i class="bi bi-x-circle"></i></button>
  </div>
  <div class="count-bar">
    <div class="count-txt" id="filterCount">Loading…</div>
    <button onclick="doRefresh()" style="font-size:12px;font-weight:700;color:var(--cyan-d);background:none;border:none;cursor:pointer">Refresh</button>
  </div>
</div>

<div style="padding:12px var(--px) calc(24px + var(--sab));max-width:480px;margin:0 auto">
  <div id="recordsList">
    <div class="empty-state"><i class="bi bi-journal-x"></i><h3>Loading records…</h3><p>Please wait</p></div>
  </div>
</div>

<div id="toast"><i class="bi" id="tIco"></i><span id="tMsg"></span></div>

<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbw8Dj1PqN5GbBXNzBCQomqJA4755mALMaSXNg_1qWUzSXBZHXaaorXuIrVyAotk0eRc/exec';
function getSess(){try{var r=localStorage.getItem('mso_session');if(r){var p=JSON.parse(r);if(p&&p.user)return p.user;}}catch(e){}try{var s=sessionStorage.getItem('mso_u');if(s){var u=JSON.parse(s);if(u)return u;}}catch(e){}return null;}
var _u=getSess();if(!_u){window.location.replace('login.html');}
var NAME=_u?_u.name:'',USER=_u?_u.u:'',ROLE=_u?_u.role:'';
var _records=[],_selectedDate=null;
(function init(){var roleLabels={supervisor:'Supervisor',cashier:'Cashier',gm:'GM',owner:'Owner'};document.getElementById('roleChip').textContent=roleLabels[ROLE]||ROLE;document.getElementById('backBtn').href=ROLE==='gm'?'dashboard-gm.html':ROLE==='cashier'?'dashboard-cashier.html':'dashboard-supervisor.html';var today=new Date();var monthAgo=new Date();monthAgo.setDate(today.getDate()-30);document.getElementById('toDate').value=today.toISOString().split('T')[0];document.getElementById('fromDate').value=monthAgo.toISOString().split('T')[0];var params=new URLSearchParams(window.location.search);var dateParam=params.get('date');if(dateParam){document.getElementById('fromDate').value=dateParam;document.getElementById('toDate').value=dateParam;}doRefresh();}());
function resetFilter(){var today=new Date();var monthAgo=new Date();monthAgo.setDate(today.getDate()-30);document.getElementById('toDate').value=today.toISOString().split('T')[0];document.getElementById('fromDate').value=monthAgo.toISOString().split('T')[0];doRefresh();}
function doRefresh(){var ri=document.getElementById('rfIco');if(ri)ri.style.animation='rot .7s linear infinite';var from=document.getElementById('fromDate').value;var to=document.getElementById('toDate').value;var url=new URL(SCRIPT_URL);url.searchParams.set('action','getRecords');url.searchParams.set('station','mso');url.searchParams.set('username',USER);if(from)url.searchParams.set('from',from);if(to)url.searchParams.set('to',to);url.searchParams.set('limit','60');fetch(url.toString(),{method:'GET',redirect:'follow'}).then(function(r){return r.json();}).then(function(d){if(ri)ri.style.animation='none';if(!d.ok){showEmpty('Could not load records');return;}_records=d.records||[];document.getElementById('filterCount').textContent=_records.length+' record'+((_records.length!==1)?'s':'');renderList();}).catch(function(){if(ri)ri.style.animation='none';showEmpty('Network error — check connection');});}
function renderList(){if(_records.length===0){showEmpty('No records found for the selected date range');return;}var html=_records.map(function(r,i){var d=new Date(r.date);var dayName=d.toLocaleDateString('en-NG',{weekday:'short'}).toUpperCase();var dayNum=d.getDate();var month=d.toLocaleDateString('en-NG',{month:'short'}).toUpperCase();var isSelected=_selectedDate===r.date;var statusPill=r.status==='complete'?'<span class="pill p-g">✓ Complete</span>':r.status==='opening_only'?'<span class="pill p-a">⏳ Opening Only</span>':r.grandTotal>0?'<span class="pill p-c">Partial</span>':'<span class="pill p-n">— No Data</span>';return '<div class="record-card'+(isSelected?' selected':'')+'" id="rc_'+i+'" onclick="selectRecord('+i+')">'+
'<div class="rc-top"><div class="rc-date-block"><div class="rc-day">'+dayName+'</div><div class="rc-num">'+dayNum+'</div><div class="rc-mon">'+month+'</div></div>'+
'<div class="rc-divider"></div>'+
'<div class="rc-info"><div class="rc-title">'+d.toLocaleDateString('en-NG',{day:'numeric',month:'long',year:'numeric'})+'</div><div class="rc-sub">'+statusPill+'<span style="color:var(--cyan-d);font-family:var(--mono);font-size:10px">'+(r.pmsLitres?Number(r.pmsLitres).toLocaleString('en-NG',{maximumFractionDigits:2})+'L PMS':'')+'</span>'+(r.agoLitres?'<span style="color:var(--amber-d);font-family:var(--mono);font-size:10px">'+Number(r.agoLitres).toLocaleString('en-NG',{maximumFractionDigits:2})+'L AGO</span>':'')+'<span style="color:var(--text-4);font-size:10px">'+r.submittedBy+'</span></div></div>'+
'<div class="rc-meta"><div class="rc-amount">'+(r.grandTotal?'₦'+Number(r.grandTotal).toLocaleString('en-NG'):'₦—')+'</div><div class="rc-litres">'+(r.cashToBank?'Bank: ₦'+Number(r.cashToBank).toLocaleString('en-NG'):'')+'</div><i class="bi bi-chevron-'+(isSelected?'down':'right')+' rc-chevron"></i></div></div>'+
(isSelected?buildDetailPanel(r):'<div id="dp_'+i+'"></div>')+
'</div>';}).join('');document.getElementById('recordsList').innerHTML=html;}
function selectRecord(idx){var r=_records[idx];if(_selectedDate===r.date){_selectedDate=null;renderList();return;}_selectedDate=r.date;loadDetailAndRender(idx,r.date);}
function loadDetailAndRender(idx,date){var url=new URL(SCRIPT_URL);url.searchParams.set('action','getDailyReport');url.searchParams.set('station','mso');url.searchParams.set('date',date);url.searchParams.set('username',USER);fetch(url.toString(),{method:'GET',redirect:'follow'}).then(function(r){return r.json();}).then(function(d){if(d.ok&&d.report)_records[idx]._full=d.report;renderList();setTimeout(function(){var el=document.getElementById('rc_'+idx);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);}).catch(function(){renderList();});}
function buildDetailPanel(r){var full=r._full||{};var canEdit=ROLE==='supervisor'||ROLE==='gm'||ROLE==='owner';var isGM=ROLE==='gm'||ROLE==='owner';
var tanks=[{id:'TK1',product:'PMS',open:full.tk1_opening,close:full.tk1_closing,diff:full.tk1_diff,margin:full.tk1_margin},{id:'TK2',product:'PMS',open:full.tk2_opening,close:full.tk2_closing,diff:full.tk2_diff,margin:full.tk2_margin},{id:'TK3',product:'PMS',open:full.tk3_opening,close:full.tk3_closing,diff:full.tk3_diff,margin:full.tk3_margin},{id:'TK4',product:'AGO',open:full.tk4_opening,close:full.tk4_closing,diff:full.tk4_diff,margin:full.tk4_margin}];
var tankRows=tanks.map(function(t){var pClass=t.product==='AGO'?'p-a':'p-c';return '<tr><td><span class="pill '+pClass+'">'+t.id+'</span></td><td style="font-family:var(--mono);font-weight:600">'+(t.open?Number(t.open).toLocaleString('en-NG')+'L':'—')+'</td><td style="font-family:var(--mono)">'+(t.close?Number(t.close).toLocaleString('en-NG')+'L':'<span style="color:var(--amber-d)">Pending</span>')+'</td><td style="font-family:var(--mono);font-weight:700;color:var(--cyan-d)">'+(t.diff>0?Number(t.diff).toLocaleString('en-NG',{maximumFractionDigits:2})+'L':'—')+'</td><td style="font-family:var(--mono);font-weight:700;color:var(--purple)">'+(t.margin>0?Number(t.margin).toFixed(2)+'L':'—')+'</td><td style="font-family:var(--mono);font-weight:800;color:var(--green-d)">'+(t.diff>0?Number(t.diff).toLocaleString('en-NG',{maximumFractionDigits:2})+'L':'—')+'</td></tr>';}).join('');
var totalPmsDiff=Number(full.tk1_diff||0)+Number(full.tk2_diff||0)+Number(full.tk3_diff||0);var totalPmsMargin=Number(full.tk1_margin||0)+Number(full.tk2_margin||0)+Number(full.tk3_margin||0);var totalPmsLitres=Number(full.pms_litres||0);var totalAgoLitres=Number(full.ago_litres||0);
var expenseRows=(full.expense_items||[]).length>0?(full.expense_items||[]).map(function(e){return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--g100)"><span style="font-size:13px;color:var(--text-2)">'+e.description+'</span><span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red-d)">₦'+Number(e.amount).toLocaleString('en-NG')+'</span></div>';}).join(''):'<div style="padding:12px 0;text-align:center;color:var(--text-4);font-size:12px">No expenses recorded</div>';
return '<div class="detail-panel">'+
'<div class="dp-head"><div class="dp-title"><i class="bi bi-calendar-check" style="color:var(--cyan-d)"></i>'+r.date+' — Full Report</div>'+
'<div class="dp-actions">'+
(canEdit&&!isGM?'<button class="dp-btn dp-btn-edit" onclick="requestEditForDate(\''+r.date+'\')"><i class="bi bi-pencil-square"></i> Request Edit</button>':'')+
(isGM?'<button class="dp-btn dp-btn-edit" onclick="editRecord(\''+r.date+'\')"><i class="bi bi-pencil-square"></i> Edit</button>':'')+
'<button class="dp-btn dp-btn-dip" onclick="openDipForDate(\''+r.date+'\')"><i class="bi bi-water"></i> Dip</button>'+
'<button class="dp-btn dp-btn-summary" onclick="openSummary(\''+r.date+'\')"><i class="bi bi-printer"></i> Summary</button>'+
'<div class="dp-close" onclick="closeDetail()">×</div></div></div>'+
'<div class="dp-body">'+
'<div class="mini-kpis">'+
'<div class="mk" style="background:var(--cyan-ll);border:1px solid var(--cyan-l)"><div class="mk-lbl">PMS Sold</div><div class="mk-val" style="color:var(--cyan-d)">'+(totalPmsLitres?totalPmsLitres.toLocaleString('en-NG',{maximumFractionDigits:2})+'L':'—')+'</div></div>'+
'<div class="mk" style="background:var(--amber-l);border:1px solid var(--amber-b)"><div class="mk-lbl">AGO Sold</div><div class="mk-val" style="color:var(--amber-d)">'+(totalAgoLitres?totalAgoLitres.toLocaleString('en-NG',{maximumFractionDigits:2})+'L':'—')+'</div></div>'+
'<div class="mk" style="background:var(--green-l);border:1px solid var(--green-b)"><div class="mk-lbl">Grand Total</div><div class="mk-val" style="color:var(--green-d)">'+(r.grandTotal?'₦'+Number(r.grandTotal).toLocaleString('en-NG'):'—')+'</div></div>'+
'<div class="mk" style="background:var(--g100);border:1px solid var(--border)"><div class="mk-lbl">Cash to Bank</div><div class="mk-val">'+(r.cashToBank?'₦'+Number(r.cashToBank).toLocaleString('en-NG'):'—')+'</div></div>'+
'</div>'+
'<div class="dp-section"><div class="dp-sec-title">Tank Dip Readings</div><div style="overflow-x:auto"><table class="detail-tbl"><thead><tr><th>Tank</th><th>Opening</th><th>Closing</th><th>Dip Diff</th><th>Margin</th><th>Litres Sold</th></tr></thead><tbody>'+tankRows+'</tbody><tfoot><tr><td colspan="3">PMS Total</td><td style="font-family:var(--mono);color:var(--cyan-d)">'+totalPmsDiff.toLocaleString('en-NG',{maximumFractionDigits:2})+'L</td><td style="font-family:var(--mono);color:var(--purple)">'+totalPmsMargin.toFixed(2)+'L</td><td style="font-family:var(--mono);color:var(--green-d)">'+totalPmsLitres.toLocaleString('en-NG',{maximumFractionDigits:2})+'L</td></tr></tfoot></table></div></div>'+
'<div class="dp-section"><div class="dp-sec-title">Revenue</div><div class="pay-grid"><div class="pay-item" style="background:var(--cyan-ll);border-color:var(--cyan-l)"><div class="pay-lbl">PMS Revenue</div><div class="pay-val" style="color:var(--cyan-d)">'+(full.pms_revenue?'₦'+Number(full.pms_revenue).toLocaleString('en-NG'):'—')+'</div></div><div class="pay-item" style="background:var(--amber-l);border-color:var(--amber-b)"><div class="pay-lbl">AGO Revenue</div><div class="pay-val" style="color:var(--amber-d)">'+(full.ago_revenue?'₦'+Number(full.ago_revenue).toLocaleString('en-NG'):'—')+'</div></div></div></div>'+
(isGM?'<div class="dp-section"><div class="dp-sec-title">Payment Breakdown</div><div class="pay-grid"><div class="pay-item"><div class="pay-lbl">POS (MP)</div><div class="pay-val">'+(full.pos_mp?'₦'+Number(full.pos_mp).toLocaleString('en-NG'):'—')+'</div></div><div class="pay-item"><div class="pay-lbl">POS (ZM)</div><div class="pay-val">'+(full.pos_zm?'₦'+Number(full.pos_zm).toLocaleString('en-NG'):'—')+'</div></div><div class="pay-item"><div class="pay-lbl">Cash</div><div class="pay-val">'+(full.cash?'₦'+Number(full.cash).toLocaleString('en-NG'):'—')+'</div></div><div class="pay-item" style="background:var(--green-l);border-color:var(--green-b)"><div class="pay-lbl">Cash to Bank</div><div class="pay-val" style="color:var(--green-d)">'+(full.to_bank?'₦'+Number(full.to_bank).toLocaleString('en-NG'):'—')+'</div></div></div></div>':'')+

function closeDetail(){_selectedDate=null;renderList();}
function requestEditForDate(date){var payload={action:'saveEditRequest',station:'mso',username:USER,date:date,name:NAME,requestedAt:new Date().toISOString(),message:NAME+' requests edit approval for '+date};fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload),redirect:'follow'}).then(function(r){return r.json();}).then(function(d){if(!d.ok){showToast('Could not send request','err');return;}try{localStorage.setItem('mso_edit_request_'+Date.now(),JSON.stringify({station:'mso',supervisor:NAME||USER,date:date,sentAt:new Date().toISOString()}));}catch(e){}showToast('Edit request sent to GM','ok');}).catch(function(){showToast('Network error','err');});}
function editRecord(date){window.location.href='dip-mso.html?date='+date+'&edit=1';}
function openDipForDate(date){window.location.href='dip-wizard-mso.html?date='+date;}
function openSummary(date){window.location.href='summary-mso.html?date='+date;}
function showEmpty(msg){document.getElementById('recordsList').innerHTML='<div class="empty-state"><i class="bi bi-journal-x"></i><h3>No Records Found</h3><p>'+msg+'</p></div>';}
var _tt;function showToast(msg,type){var icons={ok:'bi-check-circle-fill',err:'bi-x-circle-fill',info:'bi-info-circle-fill'};var colors={ok:'#16A34A',err:'#DC2626',info:'#1E293B'};document.getElementById('tIco').className='bi '+(icons[type]||'bi-info-circle-fill');document.getElementById('tMsg').textContent=msg;var t=document.getElementById('toast');t.style.background=colors[type]||'#1E293B';t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);}
