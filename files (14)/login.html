<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0F172A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<title>Sign In — MSO Digital</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Geist',system-ui,sans-serif;background:#0F172A;min-height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--cyan:#0EA5E9;--cyan-d:#0284C7}

.brand{padding:calc(var(--sat)+48px) 28px 32px;text-align:center}
.brand-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--cyan-d),var(--cyan));display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 24px rgba(14,165,233,.3)}
.brand-icon svg{width:32px;height:32px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-name{font-size:26px;font-weight:800;color:#F8FAFC;letter-spacing:-.5px;margin-bottom:4px}
.brand-name span{color:var(--cyan)}
.brand-sub{font-size:14px;color:#475569;font-weight:400}
.brand-tag{display:inline-flex;align-items:center;gap:6px;background:#1E293B;border:1px solid #334155;border-radius:8px;padding:5px 12px;font-size:12px;color:#64748B;font-weight:500;margin-top:10px}
.brand-tag-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;box-shadow:0 0 6px rgba(34,197,94,.5)}

.card{flex:1;background:#fff;border-radius:28px 28px 0 0;padding:28px 24px calc(28px + var(--sab))}
.card-title{font-size:20px;font-weight:800;color:#0F172A;letter-spacing:-.3px;margin-bottom:4px}
.card-sub{font-size:14px;color:#64748B;margin-bottom:24px}

.alert{display:none;gap:10px;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:16px;border:1px solid}
.alert.show{display:flex;align-items:center}
.alert-err{background:#FEF2F2;border-color:#FECACA;color:#DC2626}
.alert-net{background:#FFFBEB;border-color:#FDE68A;color:#D97706}
.success-row{display:none;align-items:center;gap:10px;padding:13px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;margin-bottom:16px}
.success-row.show{display:flex}
.success-ico{width:28px;height:28px;border-radius:50%;background:#22C55E;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:14px;font-weight:700}
.success-txt{font-size:13px;font-weight:600;color:#15803D}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;color:#374151;letter-spacing:.1px}
.inp-wrap{position:relative;display:flex;align-items:center}
.inp{width:100%;height:52px;border:1.5px solid #E2E8F0;border-radius:12px;padding:0 16px;font-family:'Geist',system-ui,sans-serif;font-size:16px;font-weight:500;color:#0F172A;background:#F8FAFC;outline:none;transition:all .14s;-webkit-appearance:none}
.inp:focus{border-color:var(--cyan);background:#fff;box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.inp.err{border-color:#DC2626;background:#FEF2F2}
.inp-pass{padding-right:50px}
.eye-btn{position:absolute;right:14px;background:none;border:none;color:#94A3B8;font-size:18px;cursor:pointer;padding:6px;display:flex;align-items:center}
.eye-btn:hover{color:#64748B}

.btn-submit{width:100%;height:54px;border-radius:14px;background:var(--cyan);color:#fff;font-family:'Geist',system-ui,sans-serif;font-size:16px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 16px rgba(14,165,233,.25);transition:all .15s;margin-top:4px;letter-spacing:-.1px}
.btn-submit:hover:not(:disabled){background:var(--cyan-d);transform:translateY(-1px)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-submit.loading .lbl{display:none}
.btn-submit:not(.loading) .spin{display:none}
.spin{width:20px;height:20px;border-radius:50%;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.footer{margin-top:20px;text-align:center}
.footer-txt{font-size:13px;color:#94A3B8}
.footer-txt strong{color:#64748B}
.footer-meta{margin-top:14px;display:flex;justify-content:center;gap:14px;font-size:12px;color:#94A3B8}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">
    <svg viewBox="0 0 24 24"><polygon points="12 2 2 22 22 22"/><line x1="12" y1="9" x2="12" y2="14"/></svg>
  </div>
  <div class="brand-name">MSO <span>Digital</span></div>
  <div class="brand-sub">Operations Management Platform</div>
  <div class="brand-tag"><div class="brand-tag-dot"></div>Authorised Mobil Dealer · Lagos</div>
</div>

<div class="card">
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to your station account</div>

  <div class="alert alert-err" id="alertErr"><span id="alertErrTxt">Invalid credentials</span></div>
  <div class="alert alert-net" id="alertNet"><span>No internet connection. Check your network.</span></div>
  <div class="success-row" id="successRow">
    <div class="success-ico">✓</div>
    <div class="success-txt" id="successTxt">Signing you in…</div>
  </div>

  <div class="field">
    <label class="field-label" for="u">Username</label>
    <input class="inp" type="text" id="u" placeholder="Enter your username" autocomplete="username" autocapitalize="none" spellcheck="false"/>
  </div>
  <div class="field">
    <label class="field-label" for="p">Password</label>
    <div class="inp-wrap">
      <input class="inp inp-pass" type="password" id="p" placeholder="Enter your password" autocomplete="current-password"/>
      <button class="eye-btn" id="eyeBtn" type="button">
        <i class="bi bi-eye" id="eyeIco"></i>
      </button>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submit()">
    <div class="spin"></div>
    <span class="lbl">Sign In</span>
  </button>

  <div class="footer">
    <div class="footer-txt">Need access? Contact your <strong>Station Manager</strong></div>
    <div class="footer-meta"><span>Secure login</span><span>MSO Digital v3</span></div>
  </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<script>
var API='https://script.google.com/macros/s/AKfycbw8Dj1PqN5GbBXNzBCQomqJA4755mALMaSXNg_1qWUzSXBZHXaaorXuIrVyAotk0eRc/exec';
var u=document.getElementById('u'),p=document.getElementById('p'),eyeBtn=document.getElementById('eyeBtn'),eyeIco=document.getElementById('eyeIco'),submitBtn=document.getElementById('submitBtn'),alertErr=document.getElementById('alertErr'),alertErrTxt=document.getElementById('alertErrTxt'),alertNet=document.getElementById('alertNet'),successRow=document.getElementById('successRow'),successTxt=document.getElementById('successTxt');
(function(){try{var r=localStorage.getItem('mso_session');if(r){var s=JSON.parse(r);if(s&&s.user)route(s.user);}}catch(e){}})();
eyeBtn.addEventListener('click',function(){var shown=p.type==='text';p.type=shown?'password':'text';eyeIco.className=shown?'bi bi-eye':'bi bi-eye-slash';});
[u,p].forEach(function(el){el.addEventListener('input',clear);el.addEventListener('keydown',function(e){if(e.key==='Enter')submit();});});
function clear(){alertErr.classList.remove('show');alertNet.classList.remove('show');u.classList.remove('err');p.classList.remove('err');}
function showErr(msg){alertErrTxt.textContent=msg;alertErr.classList.add('show');u.classList.add('err');p.classList.add('err');}
function setLoading(on){submitBtn.disabled=on;submitBtn.classList.toggle('loading',on);}
function route(s){localStorage.setItem('mso_session',JSON.stringify({user:s}));var dest;if(s.role==='owner')dest='dashboard-owner.html';else if(s.role==='gm')dest='dashboard-gm.html';else if(s.role==='supervisor')dest='dashboard-supervisor.html';else if(s.role==='cashier')dest='dashboard-cashier.html';else dest='dashboard-supervisor.html';window.location.href=dest;}
async function submit(){
  clear();
  var un=u.value.trim().toLowerCase(),pw=p.value;
  if(!un){showErr('Please enter your username.');u.focus();return;}
  if(!pw){showErr('Please enter your password.');p.focus();return;}
  if(!navigator.onLine){alertNet.classList.add('show');return;}
  setLoading(true);
  try{
    var res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'login',username:un,password:pw}),redirect:'follow'});
    var d=await res.json();
    if(!d.ok){setLoading(false);showErr(d.error||'Invalid username or password.');return;}
    successTxt.textContent='Welcome back, '+(d.user.name||d.user.u)+'!';
    successRow.classList.add('show');
    setTimeout(function(){route(d.user);},700);
  }catch(e){setLoading(false);if(!navigator.onLine)alertNet.classList.add('show');else showErr('Connection failed. Try again.');}
}
</script>
</body>
</html>
