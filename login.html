<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#06091A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Syne:wght@800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<title>Sign In — MSO Digital</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#06091A;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  padding:20px 16px calc(20px + env(safe-area-inset-bottom));
  overflow-y:auto;
}
input:focus{outline:none}
input::placeholder{color:#94A3B8}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BACKGROUND — mesh gradient
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.bg{position:fixed;inset:0;pointer-events:none;overflow:hidden}

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  will-change:transform;
}
.blob-1{
  width:700px;height:700px;
  top:-20%;left:-15%;
  background:radial-gradient(circle,rgba(23,157,208,.22) 0%,transparent 65%);
  animation:drift1 18s ease-in-out infinite alternate;
}
.blob-2{
  width:600px;height:600px;
  bottom:-10%;right:-10%;
  background:radial-gradient(circle,rgba(19,6,86,.70) 0%,transparent 65%);
  animation:drift2 22s ease-in-out infinite alternate;
}
.blob-3{
  width:400px;height:400px;
  top:40%;left:55%;
  background:radial-gradient(circle,rgba(100,50,200,.10) 0%,transparent 65%);
  animation:drift3 15s ease-in-out infinite alternate;
}

@keyframes drift1{to{transform:translate(40px,30px)}}
@keyframes drift2{to{transform:translate(-35px,-25px)}}
@keyframes drift3{to{transform:translate(-20px,40px)}}

/* Dot grid */
.bg-dots{
  position:fixed;inset:0;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:26px 26px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   OUTER WRAPPER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.wrap{
  position:relative;z-index:5;
  width:100%;max-width:400px;
  display:flex;flex-direction:column;align-items:center;gap:0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LOGO AREA — above the card
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.logo-area{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  margin-bottom:28px;
  opacity:0;animation:riseIn .65s .05s both cubic-bezier(.22,1,.36,1);
}
.logo-mark{
  width:52px;height:52px;border-radius:15px;
  background:rgba(255,255,255,.07);
  border:.5px solid rgba(255,255,255,.14);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:6px;
  box-shadow:0 0 0 6px rgba(23,157,208,.06);
}
.logo-mark img{width:100%;height:100%;object-fit:contain;display:block}
.logo-name{
  font-family:'Syne',sans-serif;
  font-size:16px;font-weight:800;
  color:rgba(255, 255, 255, 1);
  letter-spacing:-.03em;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CARD
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card{
  width:100%;
  background:#fff;
  border-radius:22px;
  padding:38px 36px 32px;
  box-shadow:
    0 0 0 .5px rgba(0,0,0,.06),
    0 4px 12px rgba(0,0,0,.08),
    0 24px 64px rgba(0,0,0,.28),
    0 0 0 1px rgba(255,255,255,.04) inset;
  opacity:0;animation:riseIn .65s .14s both cubic-bezier(.22,1,.36,1);
}

/* Heading */
.card-head{margin-bottom:26px}
.card-h{
  font-size:26px;font-weight:900;
  color:#0F172A;letter-spacing:-.055em;
  line-height:.97;margin-bottom:7px;
}
.card-sub{
  font-size:14px;color:#64748B;
  line-height:1.6;font-weight:400;
}

/* ── Alert ── */
.alert{
  display:none;align-items:flex-start;gap:9px;
  padding:11px 13px;border-radius:11px;
  font-size:13px;font-weight:500;line-height:1.45;
  margin-bottom:16px;
}
.alert.show{display:flex}
.alert-err {background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C}
.alert-net {background:#FFF7ED;border:1px solid #FED7AA;color:#92400E}
.alert i{font-size:14px;margin-top:1px;flex-shrink:0}

/* ── Fields ── */
.field{margin-bottom:13px}
.field-lbl{
  display:flex;justify-content:space-between;align-items:center;
  font-size:11.5px;font-weight:700;color:#334155;
  letter-spacing:.6px;text-transform:uppercase;
  margin-bottom:7px;
}
.field-lbl a{
  font-size:12px;font-weight:500;
  text-transform:none;letter-spacing:0;
  color:#179DD0;transition:color .15s;
}
.field-lbl a:hover{color:#1188B5}

.field-wrap{position:relative}
.field-ico{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;color:#94A3B8;
  pointer-events:none;transition:color .18s;
}
.field-wrap:focus-within .field-ico{color:#179DD0}

.field-input{
  width:100%;height:50px;
  border-radius:12px;
  padding:0 46px;
  font-size:15px;font-weight:500;
  color:#0F172A;
  background:#F8FAFC;
  border:1.5px solid #E2E8F0;
  transition:border-color .18s,box-shadow .18s,background .18s;
  -webkit-appearance:none;
}
.field-input:hover:not(:focus){border-color:#CBD5E1}
.field-input:focus{
  background:#fff;
  border-color:#179DD0;
  box-shadow:0 0 0 4px rgba(23,157,208,.12);
}
.field-input.err{
  background:#FFF5F5;
  border-color:#FCA5A5;
}
.field-input.err:focus{
  box-shadow:0 0 0 4px rgba(239,68,68,.10);
}

.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;
  font-size:17px;color:#94A3B8;
  padding:3px;line-height:1;
  transition:color .15s;
}
.eye-btn:hover{color:#475569}

/* ── Submit ── */
.submit-btn{
  width:100%;height:52px;margin-top:6px;
  border:none;border-radius:13px;
  font-size:15.5px;font-weight:800;color:#fff;
  background:#179DD0;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08),0 8px 28px rgba(23,157,208,.38);
  transition:background .18s,transform .2s,box-shadow .2s;
}
.submit-btn::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(150deg,rgba(255,255,255,.14) 0%,transparent 52%);
}
.submit-btn:hover:not(:disabled){
  background:#1188B5;
  transform:translateY(-1.5px);
  box-shadow:0 2px 6px rgba(0,0,0,.08),0 14px 36px rgba(23,157,208,.46);
}
.submit-btn:active:not(:disabled){transform:translateY(0)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-label{display:flex;align-items:center;gap:12px}
.btn-circle{
  width:31px;height:31px;border-radius:50%;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  transition:transform .18s;
}
.submit-btn:hover:not(:disabled) .btn-circle{transform:translateX(3px)}

.spinner{
  width:21px;height:21px;
  border:2.5px solid rgba(255,255,255,.25);
  border-top-color:#fff;
  border-radius:50%;
  position:absolute;
  animation:spin .65s linear infinite;
  display:none;
}
.submit-btn.loading .spinner{display:block}
.submit-btn.loading .btn-label{opacity:0}

@keyframes spin{to{transform:rotate(360deg)}}

/* ── Success ── */
.success-row{
  display:none;align-items:center;gap:8px;
  padding:11px 13px;border-radius:11px;
  margin-top:12px;
  background:#F0FDF4;border:1px solid #BBF7D0;
  font-size:13px;font-weight:600;color:#059669;
}
.success-row.show{display:flex}
.success-row i{font-size:16px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BELOW CARD
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.below-card{
  width:100%;
  display:flex;flex-direction:column;align-items:center;
  gap:14px;
  margin-top:20px;
  opacity:0;animation:riseIn .65s .28s both cubic-bezier(.22,1,.36,1);
}

.security-row{
  display:flex;align-items:center;gap:7px;
  font-size:11.5px;color:rgba(255,255,255,.25);
}
.security-row i{font-size:12px;color:rgba(23,157,208,.5)}

.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,.28);
  transition:color .18s;
}
.back-link:hover{color:rgba(255,255,255,.65)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ANIMATION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes riseIn{
  from{opacity:0;transform:translateY(20px)}
  to  {opacity:1;transform:none}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESPONSIVE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media(max-width:480px){
  body{padding:16px 14px calc(16px + env(safe-area-inset-bottom))}
  .card{padding:30px 24px 26px;border-radius:20px}
  .card-h{font-size:24px}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .blob{display:none}
}

</style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="bg-dots"></div>

<!-- Main -->
<div class="wrap">

  <!-- Logo above card -->
  <div class="logo-area">
    <div >
      <img src="images/msolimpid.png" alt="MSO Limpid" style="height:36px;width:auto;display:block;"/>
    </div>
    <div class="logo-name">Digital Platform</div>
  </div>

  <!-- White card -->
  <div class="card">

    <div class="card-head">
      <h1 class="card-h">Sign in</h1>
      <p class="card-sub">Enter your credentials to access your dashboard.</p>
    </div>

    <!-- Error -->
    <div class="alert alert-err" id="alertErr">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="alertErrTxt"></span>
    </div>
    <!-- Network error -->
    <div class="alert alert-net" id="alertNet">
      <i class="bi bi-wifi-off"></i>
      <span>No internet — check your connection and try again.</span>
    </div>

    <!-- Username -->
    <div class="field">
      <div class="field-lbl"><span>Username</span></div>
      <div class="field-wrap">
        <i class="bi bi-person field-ico"></i>
        <input class="field-input" id="inp-user"
          type="text" placeholder="Your username"
          autocomplete="username" autocapitalize="off"
          autocorrect="off" spellcheck="false"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <div class="field-lbl">
        <span>Password</span>
        <a href="#" onclick="return false">Forgot?</a>
      </div>
      <div class="field-wrap">
        <i class="bi bi-lock field-ico"></i>
        <input class="field-input" id="inp-pass"
          type="password" placeholder="Your password"
          autocomplete="current-password"/>
        <button class="eye-btn" id="eye-btn" type="button" tabindex="-1">
          <i class="bi bi-eye" id="eye-ico"></i>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submit-btn" type="button">
      <div class="spinner" id="spinner"></div>
      <div class="btn-label" id="btn-label">
        <span>Continue</span>
        <div class="btn-circle"><i class="bi bi-arrow-right"></i></div>
      </div>
    </button>

    <!-- Success -->
    <div class="success-row" id="success-row">
      <i class="bi bi-check-circle-fill"></i>
      <span id="success-txt"></span>
    </div>

  </div>

  <!-- Below card -->
  <div class="below-card">
    <div class="security-row">
      <i class="bi bi-shield-lock"></i>
      <span>Verified via Google Apps Script · Activity logged</span>
    </div>
    <a class="back-link" href="index.html">
      <i class="bi bi-arrow-left"></i> Back to home
    </a>
  </div>

</div>

<script>
/* ── Config ── */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8Dj1PqN5GbBXNzBCQomqJA4755mALMaSXNg_1qWUzSXBZHXaaorXuIrVyAotk0eRc/exec';

/* ── Elements ── */
const inpUser   = document.getElementById('inp-user');
const inpPass   = document.getElementById('inp-pass');
const eyeBtn    = document.getElementById('eye-btn');
const eyeIco    = document.getElementById('eye-ico');
const submitBtn = document.getElementById('submit-btn');
const spinner   = document.getElementById('spinner');
const btnLabel  = document.getElementById('btn-label');
const alertErr  = document.getElementById('alertErr');
const alertErrTxt = document.getElementById('alertErrTxt');
const alertNet  = document.getElementById('alertNet');
const successRow= document.getElementById('success-row');
const successTxt= document.getElementById('success-txt');

/* ── Auth check ── */
(function(){
  try{
    var s=JSON.parse(sessionStorage.getItem('mso_u')||'null');
    if(s) route(s);
  }catch(_){}
}());

/* ── Password toggle ── */
eyeBtn.addEventListener('click',function(){
  var shown = inpPass.type==='text';
  inpPass.type = shown?'password':'text';
  eyeIco.className = shown?'bi bi-eye':'bi bi-eye-slash';
});

/* ── Clear errors on input ── */
[inpUser,inpPass].forEach(function(el){
  el.addEventListener('input', clear);
  el.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });
});

function clear(){
  alertErr.classList.remove('show');
  alertNet.classList.remove('show');
  inpUser.classList.remove('err');
  inpPass.classList.remove('err');
}

function showErr(msg){
  alertErrTxt.textContent = msg;
  alertErr.classList.add('show');
  inpUser.classList.add('err');
  inpPass.classList.add('err');
}

function setLoading(on){
  submitBtn.disabled = on;
  submitBtn.classList.toggle('loading', on);
}

function route(s){
  window.location.href = (s.pick||!s.station)
    ? 'select.html'
    : 'dashboard-'+s.station+'.html';
}

/* ── Submit ── */
async function submit(){
  clear();
  var u = inpUser.value.trim().toLowerCase();
  var p = inpPass.value;

  if(!u){ showErr('Please enter your username.'); inpUser.focus(); return; }
  if(!p){ showErr('Please enter your password.'); inpPass.focus(); return; }

  if(SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    showErr('Script URL not set. Open login.html and replace YOUR_APPS_SCRIPT_URL_HERE.');
    return;
  }

  if(!navigator.onLine){ alertNet.classList.add('show'); return; }

  setLoading(true);

  try{
    /*
     * GAS CORS FIX:
     * 1. Content-Type: text/plain  — avoids preflight OPTIONS request
     * 2. redirect: 'follow'        — follows the GAS 302 redirect automatically
     * 3. res.text() first          — more forgiving than res.json() on GAS responses
     */
    /* GET avoids CORS preflight — works reliably with Apps Script */
    var url = new URL(SCRIPT_URL);
    url.searchParams.set('action',   'login');
    url.searchParams.set('username', u);
    url.searchParams.set('password', p);

    var res = await fetch(url.toString(), {
      method:   'GET',
      redirect: 'follow',
    });

    var raw = await res.text();
    var data;
    try {
      data = JSON.parse(raw);
    } catch(_) {
      throw new Error('Bad response: ' + raw.slice(0, 120));
    }

    setLoading(false);

    if(!data.ok){
      showErr(data.error || 'Incorrect username or password.');
      return;
    }

    sessionStorage.setItem('mso_u', JSON.stringify(data.user));
    successTxt.textContent = data.user.pick
      ? 'Authenticated — select your station…'
      : 'Loading ' + (data.user.station || '').toUpperCase() + ' dashboard…';
    successRow.classList.add('show');
    setTimeout(function(){ route(data.user); }, 1000);

  }catch(err){
    setLoading(false);
    console.error('Login error:', err);
    if(!navigator.onLine){
      alertNet.classList.add('show');
    } else {
      showErr('Could not reach server. Check your Script URL is deployed correctly.');
    }
  }
}

submitBtn.addEventListener('click', submit);
</script>

</body>
</html>
