<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#06091A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<title>Records — MSO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;background:#06091A;color:#F1F5FA;min-height:100dvh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select{font-family:inherit}
:root{
  --cyan:#179DD0;--cyan-d:#1188B5;--cyan-l:rgba(23,157,208,.12);--cyan-b:rgba(23,157,208,.25);
  --navy:#06091A;--surface:rgba(15,21,48,.85);
  --green:#22C55E;--green-l:rgba(34,197,94,.12);
  --amber:#F59E0B;--amber-l:rgba(245,158,11,.12);
  --red:#F87171;--red-l:rgba(248,113,113,.12);
  --purple:#A78BFA;--purple-l:rgba(167,139,250,.12);
  --border:rgba(255,255,255,.07);--muted:rgba(255,255,255,.38);
  --mono:'JetBrains Mono',monospace;
  --sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);
  --bn-h:66px;
}
.bg-blobs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.blob{position:absolute;border-radius:50%;filter:blur(80px)}
.blob-1{width:600px;height:600px;top:-20%;left:-15%;background:radial-gradient(circle,rgba(23,157,208,.1) 0%,transparent 65%);animation:d1 18s ease-in-out infinite alternate}
.blob-2{width:500px;height:500px;bottom:-15%;right:-10%;background:radial-gradient(circle,rgba(19,6,86,.5) 0%,transparent 65%);animation:d2 22s ease-in-out infinite alternate}
@keyframes d1{to{transform:translate(40px,30px)}}
@keyframes d2{to{transform:translate(-35px,-25px)}}
.bg-dots{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);background-size:26px 26px}

/* TOPBAR */
.topbar{position:relative;z-index:10;padding-top:calc(var(--sat)+10px);padding-bottom:10px;padding-left:18px;padding-right:18px;background:rgba(9,13,31,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);flex-shrink:0;transition:all .13s}
.back-btn:hover{background:var(--cyan-l);border-color:var(--cyan-b);color:var(--cyan)}
.tb-info{flex:1}
.tb-title{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.02em}
.tb-sub{font-size:10px;color:var(--muted);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:4px 11px;font-size:10.5px;font-weight:700;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid var(--border)}

/* PAGE */
.page{padding:18px 18px calc(80px + var(--sab));max-width:720px;margin:0 auto;position:relative;z-index:1}

/* FILTER BAR */
.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-inp{font-family:var(--mono);font-size:13px;font-weight:600;border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;background:rgba(255,255,255,.05);color:#fff;outline:none;transition:all .13s;-webkit-appearance:none}
.filter-inp:focus{border-color:var(--cyan);background:rgba(23,157,208,.07)}
.filter-inp[type=date]{width:160px}
.filter-select{font-family:inherit;font-size:13px;font-weight:600;border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;background:rgba(255,255,255,.05);color:#fff;outline:none;transition:all .13s;cursor:pointer}
.filter-select:focus{border-color:var(--cyan)}
.btn-filter{height:38px;padding:0 16px;border-radius:9px;background:var(--cyan);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .13s;flex-shrink:0;cursor:pointer;border:none}
.btn-filter:hover{background:var(--cyan-d)}
.filter-count{font-size:11px;color:var(--muted);margin-left:auto}

/* RECORDS LIST */
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:all .14s}
.record-card:hover{border-color:var(--cyan-b);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.record-card.selected{border-color:var(--cyan-b);background:rgba(23,157,208,.06)}
.rc-top{display:flex;align-items:center;gap:12px;padding:13px 16px}
.rc-date-block{flex-shrink:0;text-align:center;width:46px}
.rc-day{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.rc-num{font-family:var(--mono);font-size:22px;font-weight:900;color:#fff;line-height:1}
.rc-mon{font-size:10px;font-weight:600;color:var(--muted);margin-top:1px}
.rc-divider{width:1px;height:40px;background:var(--border);flex-shrink:0}
.rc-info{flex:1;min-width:0}
.rc-title{font-size:13.5px;font-weight:800;color:#fff;margin-bottom:3px}
.rc-sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rc-meta{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.rc-amount{font-family:var(--mono);font-size:15px;font-weight:800;color:#fff}
.rc-litres{font-size:10px;color:var(--muted);margin-top:2px;text-align:right}
.rc-chevron{font-size:16px;color:var(--muted);flex-shrink:0;transition:transform .13s}
.record-card.selected .rc-chevron{transform:rotate(90deg);color:var(--cyan)}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:2px 9px;font-size:10px;font-weight:700;white-space:nowrap}
.p-c{background:var(--cyan-l);color:var(--cyan);border:1px solid var(--cyan-b)}
.p-g{background:var(--green-l);color:#4ADE80;border:1px solid rgba(34,197,94,.22)}
.p-a{background:var(--amber-l);color:var(--amber);border:1px solid rgba(245,158,11,.22)}
.p-r{background:var(--red-l);color:var(--red);border:1px solid rgba(248,113,113,.22)}
.p-n{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid var(--border)}
.p-purple{background:var(--purple-l);color:var(--purple);border:1px solid rgba(167,139,250,.22)}

/* DETAIL PANEL */
.detail-panel{background:var(--surface);border:1.5px solid var(--cyan-b);border-radius:16px;overflow:hidden;margin-bottom:14px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.dp-head{padding:14px 18px;background:rgba(23,157,208,.08);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dp-title{font-size:14px;font-weight:800;color:#fff}
.dp-actions{display:flex;align-items:center;gap:8px}
.dp-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .13s;border:none}
.dp-btn-edit{background:var(--purple-l);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.dp-btn-edit:hover{background:rgba(167,139,250,.2)}
.dp-btn-dip{background:var(--cyan-l);color:var(--cyan);border:1px solid var(--cyan-b)}
.dp-btn-dip:hover{background:rgba(23,157,208,.2)}
.dp-btn-summary{background:var(--green-l);color:#4ADE80;border:1px solid rgba(34,197,94,.22)}
.dp-btn-summary:hover{background:rgba(34,197,94,.18)}
.dp-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .13s}
.dp-close:hover{background:rgba(255,255,255,.15);color:#fff}
.dp-body{padding:16px 18px}

/* DETAIL SECTIONS */
.dp-section{margin-bottom:16px}
.dp-sec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dp-sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* TANK DETAIL TABLE */
.detail-tbl{width:100%;border-collapse:collapse}
.detail-tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:7px 12px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.detail-tbl td{font-size:12px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.8);vertical-align:middle}
.detail-tbl tr:last-child td{border:none}
.detail-tbl tr:hover td{background:rgba(255,255,255,.02)}
.detail-tbl tfoot td{font-size:12px;font-weight:800;padding:9px 12px;background:var(--cyan-l);color:var(--cyan);border-top:1px solid var(--cyan-b)}

/* KPI MINI GRID */
.mini-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mk{border-radius:10px;padding:11px 13px}
.mk-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:3px}
.mk-val{font-family:var(--mono);font-size:15px;font-weight:800}

/* PAYMENT BREAKDOWN */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-item{border-radius:9px;padding:10px 12px;border:1px solid var(--border)}
.pay-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:3px}
.pay-val{font-family:var(--mono);font-size:14px;font-weight:800;color:#fff}

/* EMPTY STATE */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state i{font-size:42px;display:block;margin-bottom:14px;opacity:.3}
.empty-state h3{font-size:15px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:6px}
.empty-state p{font-size:12.5px}

/* LOADING */
.loading-state{text-align:center;padding:40px;color:var(--muted)}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(9,13,31,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:7px 4px calc(7px + var(--sab));z-index:700}
.bn-inner{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 10px;border-radius:10px;font-size:9.5px;font-weight:600;color:var(--muted);cursor:pointer;flex:1;border:1px solid transparent;transition:all .13s}
.bn-item i{font-size:20px;line-height:1}
.bn-item.on{color:var(--cyan);background:var(--cyan-l);border-color:var(--cyan-b)}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);z-index:9999;background:rgba(9,13,31,.96);color:#fff;border:1px solid var(--border);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:0 8px 28px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;max-width:92vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

@media(max-width:600px){.mini-kpis{grid-template-columns:1fr 1fr}.pay-grid{grid-template-columns:1fr}.filter-bar{gap:8px}.filter-inp[type=date]{width:140px}}
@media(max-width:767px){.bottom-nav{display:block}.page{padding-bottom:calc(80px + var(--bn-h) + var(--sab))}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}.blob{display:none}}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<div class="bg-dots"></div>

<header class="topbar">
  <a href="dashboard-supervisor.html" class="back-btn" id="backBtn"><i class="bi bi-arrow-left"></i></a>
  <div class="tb-info">
    <div class="tb-title">Daily Records</div>
    <div class="tb-sub" id="tbSub">MSO Limpid Co. Ltd</div>
  </div>
  <div class="tb-right">
    <div class="chip" id="roleChip">—</div>
    <button type="button" style="width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all .13s" onclick="doRefresh()" title="Refresh"><i class="bi bi-arrow-clockwise" id="rfIco"></i></button>
  </div>
</header>

<div class="page">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <input type="date" class="filter-inp" id="fromDate" title="From date"/>
    <input type="date" class="filter-inp" id="toDate" title="To date"/>
    <button type="button" class="btn-filter" onclick="doRefresh()"><i class="bi bi-search"></i>Search</button>
    <button type="button" class="btn-filter" style="background:rgba(255,255,255,.08);border:1px solid var(--border)" onclick="resetFilter()"><i class="bi bi-x"></i>Reset</button>
    <div class="filter-count" id="filterCount">—</div>
  </div>

  <!-- RECORDS LIST -->
  <div id="recordsList">
    <div class="loading-state"><div class="spin" style="width:24px;height:24px;margin:0 auto 12px;border-width:3px"></div>Loading records…</div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bn-inner">
    <a class="bn-item" href="dashboard-supervisor.html"><i class="bi bi-grid-1x2-fill"></i><span>Home</span></a>
    <a class="bn-item" href="dip-mso.html"><i class="bi bi-water"></i><span>Dip</span></a>
    <a class="bn-item" href="discharge-mso.html"><i class="bi bi-truck"></i><span>Discharge</span></a>
    <a class="bn-item on" href="records-mso.html"><i class="bi bi-journal-text"></i><span>Records</span></a>
    <a class="bn-item" href="chat-mso.html"><i class="bi bi-chat-dots"></i><span>Chat</span></a>
  </div>
</nav>

<div id="toast"><i class="bi" id="tIco"></i><span id="tMsg">—</span></div>

<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbw8Dj1PqN5GbBXNzBCQomqJA4755mALMaSXNg_1qWUzSXBZHXaaorXuIrVyAotk0eRc/exec';
function getSess(){try{var r=localStorage.getItem('mso_session');if(r){var p=JSON.parse(r);if(p&&p.user)return p.user;}}catch(e){}try{var s=sessionStorage.getItem('mso_u');if(s){var u=JSON.parse(s);if(u)return u;}}catch(e){}return null;}
var _u=getSess();if(!_u){window.location.replace('login.html');}
var NAME=_u?_u.name:'',USER=_u?_u.u:'',ROLE=_u?_u.role:'';

var _records=[];
var _selectedDate=null;

(function init(){
  /* Set role chip and back link */
  var roleLabels={supervisor:'Supervisor',cashier:'Cashier',gm:'GM',owner:'Owner'};
  document.getElementById('roleChip').textContent=roleLabels[ROLE]||ROLE;
  document.getElementById('backBtn').href=ROLE==='gm'?'dashboard-gm.html':ROLE==='cashier'?'dashboard-cashier.html':'dashboard-supervisor.html';

  /* Default filter: last 30 days */
  var today=new Date();
  var monthAgo=new Date();monthAgo.setDate(today.getDate()-30);
  document.getElementById('toDate').value=today.toISOString().split('T')[0];
  document.getElementById('fromDate').value=monthAgo.toISOString().split('T')[0];

  /* Check if opened with a specific date (from dip page edit) */
  var params=new URLSearchParams(window.location.search);
  var dateParam=params.get('date');
  if(dateParam){
    document.getElementById('fromDate').value=dateParam;
    document.getElementById('toDate').value=dateParam;
  }

  doRefresh();
}());

function resetFilter(){
  var today=new Date();
  var monthAgo=new Date();monthAgo.setDate(today.getDate()-30);
  document.getElementById('toDate').value=today.toISOString().split('T')[0];
  document.getElementById('fromDate').value=monthAgo.toISOString().split('T')[0];
  doRefresh();
}

function doRefresh(){
  var ri=document.getElementById('rfIco');if(ri)ri.style.animation='rot .7s linear infinite';
  var from=document.getElementById('fromDate').value;
  var to=document.getElementById('toDate').value;
  var url=new URL(SCRIPT_URL);
  url.searchParams.set('action','getRecords');
  url.searchParams.set('station','mso');
  url.searchParams.set('username',USER);
  if(from)url.searchParams.set('from',from);
  if(to)url.searchParams.set('to',to);
  url.searchParams.set('limit','60');
  fetch(url.toString(),{method:'GET',redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(ri)ri.style.animation='none';
      if(!d.ok){showEmpty('Could not load records');return;}
      _records=d.records||[];
      document.getElementById('filterCount').textContent=_records.length+' record'+((_records.length!==1)?'s':'');
      renderList();
    }).catch(function(){
      if(ri)ri.style.animation='none';
      showEmpty('Network error — check connection');
    });
}

function renderList(){
  if(_records.length===0){
    showEmpty('No records found for the selected date range');
    return;
  }
  var html=_records.map(function(r,i){
    var d=new Date(r.date);
    var dayName=d.toLocaleDateString('en-NG',{weekday:'short'}).toUpperCase();
    var dayNum=d.getDate();
    var month=d.toLocaleDateString('en-NG',{month:'short'}).toUpperCase();
    var isSelected=_selectedDate===r.date;
    var statusPill=r.status==='complete'
      ?'<span class="pill p-g">✓ Complete</span>'
      :r.status==='opening_only'
        ?'<span class="pill p-a">⏳ Opening Dip Only</span>'
        :r.grandTotal>0
          ?'<span class="pill p-c">Partial</span>'
          :'<span class="pill p-n">— No Data</span>';
    return '<div class="record-card'+(isSelected?' selected':'')+'" id="rc_'+i+'" onclick="selectRecord('+i+')">'+
      '<div class="rc-top">'+
        '<div class="rc-date-block">'+
          '<div class="rc-day">'+dayName+'</div>'+
          '<div class="rc-num">'+dayNum+'</div>'+
          '<div class="rc-mon">'+month+'</div>'+
        '</div>'+
        '<div class="rc-divider"></div>'+
        '<div class="rc-info">'+
          '<div class="rc-title">'+d.toLocaleDateString('en-NG',{day:'numeric',month:'long',year:'numeric'})+'</div>'+
          '<div class="rc-sub">'+
            statusPill+
            '<span style="color:var(--cyan);font-family:var(--mono);font-size:11px">'+(r.pmsLitres?Number(r.pmsLitres).toLocaleString('en-NG',{maximumFractionDigits:2})+'L PMS':'—')+'</span>'+
            (r.agoLitres?'<span style="color:var(--amber);font-family:var(--mono);font-size:11px">'+Number(r.agoLitres).toLocaleString('en-NG',{maximumFractionDigits:2})+'L AGO</span>':'')+''+
            '<span style="color:var(--muted);font-size:10.5px">by '+r.submittedBy+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="rc-meta">'+
          '<div>'+
            '<div class="rc-amount">'+(r.grandTotal?'₦'+Number(r.grandTotal).toLocaleString('en-NG'):'₦—')+'</div>'+
            '<div class="rc-litres">'+(r.pmsLitres&&r.agoLitres?'Cash to bank: ₦'+Number(r.cashToBank||0).toLocaleString('en-NG'):'')+'</div>'+
          '</div>'+
          '<i class="bi bi-chevron-right rc-chevron"></i>'+
        '</div>'+
      '</div>'+
      (isSelected?buildDetailPanel(r):'<div id="dp_'+i+'"></div>')+
    '</div>';
  }).join('');
  document.getElementById('recordsList').innerHTML=html;
}

function selectRecord(idx){
  var r=_records[idx];
  if(_selectedDate===r.date){
    /* Collapse */
    _selectedDate=null;
    renderList();
    return;
  }
  _selectedDate=r.date;
  /* Load full detail */
  loadDetailAndRender(idx,r.date);
}

function loadDetailAndRender(idx,date){
  var url=new URL(SCRIPT_URL);
  url.searchParams.set('action','getDailyReport');
  url.searchParams.set('station','mso');
  url.searchParams.set('date',date);
  url.searchParams.set('username',USER);
  fetch(url.toString(),{method:'GET',redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok&&d.report){
        /* Merge full report into record */
        _records[idx]._full=d.report;
      }
      renderList();
      /* Scroll to detail */
      setTimeout(function(){
        var el=document.getElementById('rc_'+idx);
        if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
      },100);
    }).catch(function(){renderList();});
}

function buildDetailPanel(r){
  var full=r._full||{};
  var canEdit=ROLE==='supervisor'||ROLE==='gm'||ROLE==='owner';
  var isGM=ROLE==='gm'||ROLE==='owner';

  /* Tank readings */
  var tanks=[
    {id:'TK1',product:'PMS',open:full.tk1_opening,close:full.tk1_closing,diff:full.tk1_diff,margin:full.tk1_margin},
    {id:'TK2',product:'PMS',open:full.tk2_opening,close:full.tk2_closing,diff:full.tk2_diff,margin:full.tk2_margin},
    {id:'TK3',product:'PMS',open:full.tk3_opening,close:full.tk3_closing,diff:full.tk3_diff,margin:full.tk3_margin},
    {id:'TK4',product:'AGO',open:full.tk4_opening,close:full.tk4_closing,diff:full.tk4_diff,margin:full.tk4_margin},
  ];

  var tankRows=tanks.map(function(t){
    var isEmpty=!t.open&&!t.close;
    var pClass=t.product==='AGO'?'p-a':'p-c';
    return '<tr>'+
      '<td><span class="pill '+pClass+'">'+t.id+'</span></td>'+
      '<td style="font-family:var(--mono);font-weight:600">'+(t.open?Number(t.open).toLocaleString('en-NG')+'L':'—')+'</td>'+
      '<td style="font-family:var(--mono)">'+(t.close?Number(t.close).toLocaleString('en-NG')+'L':'<span style="color:var(--amber)">Pending</span>')+'</td>'+
      '<td style="font-family:var(--mono);font-weight:700;color:var(--cyan)">'+(t.diff>0?Number(t.diff).toLocaleString('en-NG',{maximumFractionDigits:2})+'L':'—')+'</td>'+
      '<td style="font-family:var(--mono);font-weight:700;color:var(--purple)">'+(t.margin>0?Number(t.margin).toFixed(2)+'L':'—')+'</td>'+
      '<td style="font-family:var(--mono);font-weight:800;color:#4ADE80">'+(t.diff>0&&t.margin>=0?((Number(t.diff)+Number(t.margin)).toFixed(2))+'L':'—')+'</td>'+
    '</tr>';
  }).join('');

  var totalPmsDiff=(Number(full.tk1_diff||0)+Number(full.tk2_diff||0)+Number(full.tk3_diff||0));
  var totalPmsMargin=(Number(full.tk1_margin||0)+Number(full.tk2_margin||0)+Number(full.tk3_margin||0));
  var totalPmsLitres=Number(full.pms_litres||0);
  var totalAgoLitres=Number(full.ago_litres||0);

  /* Expense items */
  var expenseRows=(full.expense_items||[]).length>0
    ?(full.expense_items||[]).map(function(e){
      return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)">'+
        '<span style="font-size:12.5px;color:rgba(255,255,255,.75)">'+e.description+'</span>'+
        '<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red)">₦'+Number(e.amount).toLocaleString('en-NG')+'</span>'+
      '</div>';
    }).join('')
    :'<div style="padding:12px 0;text-align:center;color:var(--muted);font-size:12px">No expenses recorded</div>';

  return '<div class="detail-panel">'+
    '<div class="dp-head">'+
      '<div class="dp-title"><i class="bi bi-calendar-check" style="margin-right:7px;color:var(--cyan)"></i>'+r.date+' — Full Report</div>'+
      '<div class="dp-actions">'+
        (canEdit&&!isGM?'<button type="button" class="dp-btn dp-btn-edit" onclick="requestEditForDate(\''+r.date+'\')"><i class="bi bi-pencil-square"></i> Request Edit</button>':'')+ 
        (isGM?'<button type="button" class="dp-btn dp-btn-edit" onclick="editRecord(\''+r.date+'\')"><i class="bi bi-pencil-square"></i> Edit</button>':'')+
        '<button type="button" class="dp-btn dp-btn-dip" onclick="openDipForDate(\''+r.date+'\')"><i class="bi bi-water"></i> View Dip</button>'+
        '<button type="button" class="dp-btn dp-btn-summary" onclick="openSummary(\''+r.date+'\')"><i class="bi bi-printer"></i> Summary</button>'+
        '<div class="dp-close" onclick="closeDetail()">×</div>'+
      '</div>'+
    '</div>'+
    '<div class="dp-body">'+

      /* KPI mini grid */
      '<div class="mini-kpis">'+
        '<div class="mk" style="background:var(--cyan-l);border:1px solid var(--cyan-b)"><div class="mk-lbl">PMS Sold</div><div class="mk-val" style="color:var(--cyan)">'+(totalPmsLitres?totalPmsLitres.toLocaleString('en-NG',{maximumFractionDigits:2})+'L':'—')+'</div></div>'+
        '<div class="mk" style="background:var(--amber-l);border:1px solid rgba(245,158,11,.22)"><div class="mk-lbl">AGO Sold</div><div class="mk-val" style="color:var(--amber)">'+(totalAgoLitres?totalAgoLitres.toLocaleString('en-NG',{maximumFractionDigits:2})+'L':'—')+'</div></div>'+
        '<div class="mk" style="background:var(--green-l);border:1px solid rgba(34,197,94,.22)"><div class="mk-lbl">Grand Total</div><div class="mk-val" style="color:#4ADE80">'+(r.grandTotal?'₦'+Number(r.grandTotal).toLocaleString('en-NG'):'—')+'</div></div>'+
        '<div class="mk" style="background:rgba(255,255,255,.04);border:1px solid var(--border)"><div class="mk-lbl">Cash to Bank</div><div class="mk-val" style="color:#fff">'+(r.cashToBank?'₦'+Number(r.cashToBank).toLocaleString('en-NG'):'—')+'</div></div>'+
      '</div>'+

      /* Tank readings */
      '<div class="dp-section">'+
        '<div class="dp-sec-title">Tank Dip Readings</div>'+
        '<div style="overflow-x:auto">'+
          '<table class="detail-tbl">'+
            '<thead><tr><th>Tank</th><th>Opening</th><th>Closing</th><th>Dip Diff</th><th>Margin</th><th>Total Sold</th></tr></thead>'+
            '<tbody>'+tankRows+'</tbody>'+
            '<tfoot><tr>'+
              '<td colspan="3">PMS Total</td>'+
              '<td style="font-family:var(--mono)">'+totalPmsDiff.toLocaleString('en-NG',{maximumFractionDigits:2})+'L</td>'+
              '<td style="font-family:var(--mono);color:var(--purple)">'+totalPmsMargin.toFixed(2)+'L</td>'+
              '<td style="font-family:var(--mono);color:#4ADE80">'+totalPmsLitres.toLocaleString('en-NG',{maximumFractionDigits:2})+'L</td>'+
            '</tr></tfoot>'+
          '</table>'+
        '</div>'+
      '</div>'+

      /* Revenue */
      '<div class="dp-section">'+
        '<div class="dp-sec-title">Revenue</div>'+
        '<div class="pay-grid">'+
          '<div class="pay-item" style="background:var(--cyan-l);border-color:var(--cyan-b)"><div class="pay-lbl">PMS Revenue</div><div class="pay-val" style="color:var(--cyan)">'+(full.pms_revenue?'₦'+Number(full.pms_revenue).toLocaleString('en-NG'):'—')+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">'+(full.pms_price?'@ ₦'+Number(full.pms_price).toLocaleString('en-NG')+'/L':'')+'</div></div>'+
          '<div class="pay-item" style="background:var(--amber-l);border-color:rgba(245,158,11,.25)"><div class="pay-lbl">AGO Revenue</div><div class="pay-val" style="color:var(--amber)">'+(full.ago_revenue?'₦'+Number(full.ago_revenue).toLocaleString('en-NG'):'—')+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">'+(full.ago_price?'@ ₦'+Number(full.ago_price).toLocaleString('en-NG')+'/L':'')+'</div></div>'+
        '</div>'+
      '</div>'+

      /* Payment breakdown — GM/Owner only */
      (isGM?
        '<div class="dp-section">'+
          '<div class="dp-sec-title">Payment Breakdown</div>'+
          '<div class="pay-grid">'+
            '<div class="pay-item"><div class="pay-lbl">POS (MP)</div><div class="pay-val">'+(full.pos_mp?'₦'+Number(full.pos_mp).toLocaleString('en-NG'):'—')+'</div></div>'+
            '<div class="pay-item"><div class="pay-lbl">POS (ZM)</div><div class="pay-val">'+(full.pos_zm?'₦'+Number(full.pos_zm).toLocaleString('en-NG'):'—')+'</div></div>'+
            '<div class="pay-item"><div class="pay-lbl">Cash</div><div class="pay-val">'+(full.cash?'₦'+Number(full.cash).toLocaleString('en-NG'):'—')+'</div></div>'+
            '<div class="pay-item" style="background:var(--red-l);border-color:rgba(248,113,113,.22)"><div class="pay-lbl">POS Charges</div><div class="pay-val" style="color:var(--red)">₦'+((Number(full.pos_mp_charge||0)+Number(full.pos_zm_charge||0)).toLocaleString('en-NG'))+'</div></div>'+
            '<div class="pay-item"><div class="pay-lbl">Transfer (MP)</div><div class="pay-val">'+(full.trf_mp?'₦'+Number(full.trf_mp).toLocaleString('en-NG'):'₦0')+'</div></div>'+
            '<div class="pay-item" style="background:var(--green-l);border-color:rgba(34,197,94,.22)"><div class="pay-lbl">Cash to Bank</div><div class="pay-val" style="color:#4ADE80">'+(full.to_bank?'₦'+Number(full.to_bank).toLocaleString('en-NG'):'—')+'</div></div>'+
          '</div>'+
        '</div>'
      :'')+

      /* Expenses */
      '<div class="dp-section">'+
        '<div class="dp-sec-title">Expenses</div>'+
        expenseRows+
        '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:6px;border-top:1px solid var(--border)">'+
          '<span style="font-size:12px;font-weight:700;color:rgba(255,255,255,.75)">Total Expenses</span>'+
          '<span style="font-family:var(--mono);font-size:14px;font-weight:800;color:var(--red)">₦'+Number(full.total_expenses||0).toLocaleString('en-NG')+'</span>'+
        '</div>'+
      '</div>'+

      /* Submitted by */
      '<div style="padding:10px 0;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);margin-top:6px">'+
        '<i class="bi bi-person-check" style="color:var(--muted)"></i>'+
        '<span style="font-size:11.5px;color:var(--muted)">Submitted by <strong style="color:rgba(255,255,255,.75)">'+r.submittedBy+'</strong></span>'+
      '</div>'+

    '</div>'+/* dp-body */
  '</div>';/* detail-panel */
}

function closeDetail(){
  _selectedDate=null;
  renderList();
}

function requestEditForDate(date){
  var payload={
    action:'saveEditRequest',station:'mso',username:USER,
    date:date,name:NAME,requestedAt:new Date().toISOString(),
    message:NAME+' requests edit approval for '+date
  };
  fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload),redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok){showToast('Could not send request','err');return;}
      /* Broadcast to GM */
      try{localStorage.setItem('mso_edit_request_'+Date.now(),JSON.stringify({station:'mso',supervisor:NAME||USER,date:date,message:NAME+' requests edit approval for '+date,sentAt:new Date().toISOString()}));}catch(e){}
      showToast('Edit request sent to GM','ok');
    }).catch(function(){showToast('Network error','err');});
}

function editRecord(date){
  /* GM can edit directly */
  window.location.href='dip-mso.html?date='+date+'&edit=1';
}

function openDipForDate(date){
  window.location.href='dip-mso.html?date='+date;
}

function openSummary(date){
  window.location.href='summary-mso.html?date='+date;
}

function showEmpty(msg){
  document.getElementById('recordsList').innerHTML=
    '<div class="empty-state">'+
      '<i class="bi bi-journal-x"></i>'+
      '<h3>No Records Found</h3>'+
      '<p>'+msg+'</p>'+
    '</div>';
}

var _tt;
function showToast(msg,type){
  var icons={ok:'bi-check-circle-fill',err:'bi-x-circle-fill',info:'bi-info-circle-fill'};
  var colors={ok:'#16A34A',err:'#DC2626',info:'rgba(9,13,31,.96)'};
  document.getElementById('tIco').className='bi '+(icons[type]||'bi-info-circle-fill');
  document.getElementById('tMsg').textContent=msg;
  var t=document.getElementById('toast');t.style.background=colors[type]||'rgba(9,13,31,.96)';
  t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);
}
</script>
